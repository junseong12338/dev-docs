{% extends "base.html" %}

{% block fonts %}
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
{% endblock %}

{% block content %}
  {{ super() }}

  <!-- Floating Remote Control -->
  <nav class="page-remote" id="pageRemote">
    <button class="page-remote__btn" id="btnTop" title="맨 위로">
      <svg viewBox="0 0 24 24"><path d="M7.41 15.41L12 10.83l4.59 4.58L18 14l-6-6-6 6z"/></svg>
    </button>
    <div class="page-remote__row">
      <a class="page-remote__btn page-remote__btn--nav" id="btnPrev" title="이전 글">
        <svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
      </a>
      <a class="page-remote__btn page-remote__btn--nav" id="btnNext" title="다음 글">
        <svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
      </a>
    </div>
    <button class="page-remote__btn" id="btnBottom" title="맨 아래로">
      <svg viewBox="0 0 24 24"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6z"/></svg>
    </button>
  </nav>

  <script>
    function setupRemote() {
      var btnTop = document.getElementById('btnTop');
      var btnBottom = document.getElementById('btnBottom');
      var btnPrev = document.getElementById('btnPrev');
      var btnNext = document.getElementById('btnNext');
      if (!btnTop) return;

      btnTop.onclick = function() {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };
      btnBottom.onclick = function() {
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
      };

      // nav에서 현재 페이지 기준 이전/다음 찾기
      var allLinks = Array.from(document.querySelectorAll('.md-nav__link[href]'));
      var current = window.location.pathname;
      var currentIdx = -1;

      for (var i = 0; i < allLinks.length; i++) {
        try {
          var linkPath = new URL(allLinks[i].href).pathname;
          if (linkPath === current) {
            currentIdx = i;
            break;
          }
        } catch(e) {}
      }

      // 이전
      btnPrev.classList.remove('page-remote__btn--disabled');
      btnNext.classList.remove('page-remote__btn--disabled');

      if (currentIdx > 0) {
        btnPrev.href = allLinks[currentIdx - 1].href;
      } else {
        btnPrev.removeAttribute('href');
        btnPrev.classList.add('page-remote__btn--disabled');
      }

      // 다음
      if (currentIdx >= 0 && currentIdx < allLinks.length - 1) {
        btnNext.href = allLinks[currentIdx + 1].href;
      } else {
        btnNext.removeAttribute('href');
        btnNext.classList.add('page-remote__btn--disabled');
      }
    }

    // 최초 실행 + instant navigation 대응
    setupRemote();
    if (typeof document$ !== 'undefined') {
      document$.subscribe(function() { setupRemote(); });
    }
  </script>
{% endblock %}
